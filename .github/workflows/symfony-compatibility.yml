name: Symfony Compatibility

on:
  pull_request:
  push:
    branches:
      - master
      - main
      - development

permissions:
  contents: read

jobs:
  functional-tests:
    name: Symfony ${{ matrix.symfony }} / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    env:
      SHARED_REF: ${{ github.head_ref || github.ref_name }}
      LOCAL_PACKAGE_VERSION: 2.999.0

    strategy:
      fail-fast: false
      matrix:
        include:
          - symfony: '6.4'
            php: '8.1'
          - symfony: '7.4'
            php: '8.2'
          - symfony: '8.0'
            php: '8.4'

    steps:
      - name: Checkout AutoGridBundle
        uses: actions/checkout@v4
        with:
          path: auto-grid-bundle

      - name: Checkout AutoGridTestBundle
        uses: actions/checkout@v4
        with:
          repository: f0ska/auto-grid-test-bundle
          ref: ${{ env.SHARED_REF }}
          path: auto-grid-test-bundle

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: ctype, iconv, pdo_sqlite
          tools: composer:v2
          ini-values: memory_limit=-1

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache/files
            ~/.cache/composer/files
          key: ${{ runner.os }}-php-${{ matrix.php }}-symfony-${{ matrix.symfony }}-${{ hashFiles('auto-grid-bundle/composer.json', 'auto-grid-test-bundle/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-symfony-${{ matrix.symfony }}-
            ${{ runner.os }}-php-${{ matrix.php }}-

      - name: Create Symfony app
        run: composer create-project symfony/skeleton:"${{ matrix.symfony }}.*" app

      - name: Configure test app
        working-directory: app
        run: |
          composer config allow-plugins.symfony/flex true
          composer require --no-interaction --no-progress symfony/flex:^2
          composer config extra.symfony.require "${{ matrix.symfony }}.*"
          composer config repositories.auto-grid-bundle "{\"type\":\"path\",\"url\":\"../auto-grid-bundle\",\"options\":{\"symlink\":false,\"versions\":{\"f0ska/auto-grid-bundle\":\"${LOCAL_PACKAGE_VERSION}\"}}}"
          composer config repositories.auto-grid-test-bundle "{\"type\":\"path\",\"url\":\"../auto-grid-test-bundle\",\"options\":{\"symlink\":false,\"versions\":{\"f0ska/auto-grid-test-bundle\":\"${LOCAL_PACKAGE_VERSION}\"}}}"

          composer require --no-interaction --no-progress \
            f0ska/auto-grid-bundle:${LOCAL_PACKAGE_VERSION} \
            f0ska/auto-grid-test-bundle:${LOCAL_PACKAGE_VERSION}

          composer require --dev --no-interaction --no-progress \
            phpstan/phpstan:^2.1 \
            phpunit/phpunit:^10.5 \
            symfony/browser-kit \
            symfony/css-selector

          # Composer does not load autoload-dev from dependencies, so the root test app
          # must expose the AutoGridTestBundle test namespace explicitly.
          php -r '$file = "composer.json"; $composer = json_decode(file_get_contents($file), true, 512, JSON_THROW_ON_ERROR); $composer["autoload-dev"]["psr-4"]["F0ska\\\\AutoGridTestBundle\\\\Tests\\\\"] = "../auto-grid-test-bundle/tests/"; file_put_contents($file, json_encode($composer, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES) . PHP_EOL);'

          cat <<'EOF' > .env.test
          APP_ENV=test
          APP_SECRET='$ecretf0rt3st'
          DATABASE_URL="sqlite:///%kernel.project_dir%/var/test.db"
          DEFAULT_URI=http://localhost
          EOF

          mkdir -p config/packages/test tests
          cat <<'EOF' > config/packages/test/doctrine.yaml
          doctrine:
              dbal:
                  url: "sqlite:///%kernel.project_dir%/var/test.db"
                  dbname_suffix: ''
          EOF

          cat <<'EOF' > config/routes.yaml
          f0ska_auto_grid_test:
              resource: '@F0skaAutoGridTestBundle/config/routes.yaml'
          EOF

          cat <<'EOF' > tests/bootstrap.php
          <?php

          use Symfony\Component\Dotenv\Dotenv;

          require dirname(__DIR__).'/vendor/autoload.php';

          if (file_exists(dirname(__DIR__).'/.env.test')) {
              (new Dotenv())->bootEnv(dirname(__DIR__).'/.env.test');
          } elseif (method_exists(Dotenv::class, 'bootEnv')) {
              (new Dotenv())->bootEnv(dirname(__DIR__).'/.env');
          }

          if ($_SERVER['APP_DEBUG'] ?? false) {
              umask(0000);
          }

          $_SERVER['APP_ENV'] = $_ENV['APP_ENV'] = 'test';
          EOF

          cat <<'EOF' > phpunit.xml.dist
          <?xml version="1.0" encoding="UTF-8"?>
          <phpunit xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                   xsi:noNamespaceSchemaLocation="https://schema.phpunit.de/10.5/phpunit.xsd"
                   backupGlobals="false"
                   colors="true"
                   bootstrap="tests/bootstrap.php"
                   cacheDirectory=".phpunit.cache">
              <php>
                  <ini name="display_errors" value="1" />
                  <ini name="error_reporting" value="-1" />
                  <server name="APP_ENV" value="test" force="true" />
                  <server name="KERNEL_CLASS" value="App\Kernel" />
                  <server name="SHELL_VERBOSITY" value="-1" />
              </php>
              <testsuites>
                  <testsuite name="AutoGrid functional suite">
                      <directory>../auto-grid-test-bundle/tests</directory>
                  </testsuite>
              </testsuites>
              <source>
                  <include>
                      <directory suffix=".php">vendor/f0ska/auto-grid-bundle/src</directory>
                  </include>
              </source>
          </phpunit>
          EOF

          composer dump-autoload
          php bin/console importmap:install --no-interaction

      - name: Prepare test database
        working-directory: app
        env:
          APP_ENV: test
        run: |
          rm -f var/test.db
          php bin/console doctrine:schema:update --force --env=test
          php bin/console doctrine:fixtures:load --no-interaction --env=test

      - name: Run PHPStan on Symfony 6.4
        working-directory: app
        if: matrix.symfony == '6.4'
        run: |
          cat <<'EOF' > phpstan-ci.neon
          parameters:
              ignoreErrors:
                  -
                      path: vendor/f0ska/auto-grid-bundle/src/DependencyInjection/Configuration.php
                      message: '#Call to an undefined method Symfony\\Component\\Config\\Definition\\Builder\\.*#'
          EOF
          vendor/bin/phpstan analyse -c phpstan-ci.neon -l 5 vendor/f0ska/auto-grid-bundle/src

      - name: Run PHPStan on Symfony 7.4/8.0
        working-directory: app
        if: matrix.symfony != '6.4'
        run: vendor/bin/phpstan analyse -l 5 vendor/f0ska/auto-grid-bundle/src

      - name: Run functional tests
        working-directory: app
        env:
          APP_ENV: test
        run: vendor/bin/phpunit -c phpunit.xml.dist
