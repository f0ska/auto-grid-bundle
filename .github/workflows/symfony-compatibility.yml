name: Symfony Compatibility

on:
  pull_request:
  push:
    branches:
      - master
      - main
      - development

jobs:
  functional-tests:
    name: Symfony ${{ matrix.symfony }} / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    env:
      SHARED_REF: ${{ github.head_ref || github.ref_name }}
      LOCAL_PACKAGE_VERSION: 2.999.0

    strategy:
      fail-fast: false
      matrix:
        include:
          - symfony: '6.4'
            php: '8.1'
          - symfony: '7.4'
            php: '8.2'
          - symfony: '8.0'
            php: '8.4'

    steps:
      - name: Checkout AutoGridBundle
        uses: actions/checkout@v4
        with:
          path: auto-grid-bundle

      - name: Checkout AutoGridTestBundle
        uses: actions/checkout@v4
        with:
          repository: f0ska/auto-grid-test-bundle
          ref: ${{ env.SHARED_REF }}
          path: auto-grid-test-bundle

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: ctype, iconv, pdo_sqlite
          tools: composer:v2
          ini-values: memory_limit=-1

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache/files
            ~/.cache/composer/files
          key: ${{ runner.os }}-php-${{ matrix.php }}-symfony-${{ matrix.symfony }}-${{ hashFiles('auto-grid-bundle/composer.json', 'auto-grid-test-bundle/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-symfony-${{ matrix.symfony }}-
            ${{ runner.os }}-php-${{ matrix.php }}-

      - name: Create Symfony app
        run: composer create-project symfony/skeleton:"${{ matrix.symfony }}.*" app

      - name: Configure test app
        working-directory: app
        run: |
          composer config extra.symfony.require "${{ matrix.symfony }}.*"
          composer config repositories.auto-grid-bundle "{\"type\":\"path\",\"url\":\"../auto-grid-bundle\",\"options\":{\"symlink\":false,\"versions\":{\"f0ska/auto-grid-bundle\":\"${LOCAL_PACKAGE_VERSION}\"}}}"
          composer config repositories.auto-grid-test-bundle "{\"type\":\"path\",\"url\":\"../auto-grid-test-bundle\",\"options\":{\"symlink\":false,\"versions\":{\"f0ska/auto-grid-test-bundle\":\"${LOCAL_PACKAGE_VERSION}\"}}}"

          composer require --no-interaction --no-progress \
            f0ska/auto-grid-bundle:${LOCAL_PACKAGE_VERSION} \
            f0ska/auto-grid-test-bundle:${LOCAL_PACKAGE_VERSION}

          composer require --dev --no-interaction --no-progress \
            phpunit/phpunit:^10.5 \
            symfony/browser-kit \
            symfony/css-selector

          php -r '$file = "composer.json"; $composer = json_decode(file_get_contents($file), true, 512, JSON_THROW_ON_ERROR); $composer["autoload-dev"]["psr-4"]["F0ska\\\\AutoGridTestBundle\\\\Tests\\\\"] = "../auto-grid-test-bundle/tests/"; file_put_contents($file, json_encode($composer, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES) . PHP_EOL);'

          php -r '$bundlesFile = "config/bundles.php"; $bundles = require $bundlesFile; unset($bundles["F0ska\\\\AutoGridBundle\\\\F0skaAutoGridBundle"], $bundles["F0ska\\\\AutoGridTestBundle\\\\F0skaAutoGridTestBundle"]); $bundles["F0ska\\AutoGridBundle\\F0skaAutoGridBundle"] = ["all" => true]; $bundles["F0ska\\AutoGridTestBundle\\F0skaAutoGridTestBundle"] = ["all" => true]; $code = "<?php\n\nreturn " . var_export($bundles, true) . ";\n"; file_put_contents($bundlesFile, $code);'

          cat <<'EOF' > .env.test
          APP_ENV=test
          APP_SECRET='$ecretf0rt3st'
          DATABASE_URL="sqlite:///%kernel.project_dir%/var/test.db"
          DEFAULT_URI=http://localhost
          EOF

          cat <<'EOF' > config/packages/doctrine.yaml
          doctrine:
              dbal:
                  url: '%env(resolve:DATABASE_URL)%'
              orm:
                  auto_generate_proxy_classes: true
                  enable_lazy_ghost_objects: true
                  report_fields_where_declared: true
                  validate_xml_mapping: true
                  auto_mapping: true
          EOF

          mkdir -p config/packages/test
          cat <<'EOF' > config/packages/test/doctrine.yaml
          doctrine:
              dbal:
                  url: "sqlite:///%kernel.project_dir%/var/test.db"
                  dbname_suffix: ''
          EOF

          cat <<'EOF' > config/packages/security.yaml
          security:
              password_hashers:
                  Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: auto
              providers:
                  users_in_memory:
                      memory: null
              firewalls:
                  dev:
                      pattern: ^/(_(profiler|wdt)|css|images|js)/
                      security: false
                  main:
                      lazy: true
                      provider: users_in_memory

          when@test:
              security:
                  password_hashers:
                      Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                          algorithm: auto
                          cost: 4
                          time_cost: 3
                          memory_cost: 10
          EOF

          mkdir -p config/routes
          cat <<'EOF' > config/routes/f0ska_auto_grid_test.yaml
          f0ska_auto_grid_test:
              resource: '@F0skaAutoGridTestBundle/config/routes.yaml'
          EOF

          cat <<'EOF' > phpunit.xml.dist
          <?xml version="1.0" encoding="UTF-8"?>
          <phpunit xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                   xsi:noNamespaceSchemaLocation="https://schema.phpunit.de/10.5/phpunit.xsd"
                   backupGlobals="false"
                   colors="true"
                   bootstrap="vendor/autoload.php"
                   cacheDirectory=".phpunit.cache">
              <php>
                  <ini name="display_errors" value="1" />
                  <ini name="error_reporting" value="-1" />
                  <server name="APP_ENV" value="test" force="true" />
                  <server name="DEFAULT_URI" value="http://localhost" />
                  <server name="KERNEL_CLASS" value="App\Kernel" />
                  <server name="SHELL_VERBOSITY" value="-1" />
              </php>
              <testsuites>
                  <testsuite name="AutoGrid functional suite">
                      <directory>../auto-grid-test-bundle/tests</directory>
                  </testsuite>
              </testsuites>
              <source>
                  <include>
                      <directory suffix=".php">vendor/f0ska/auto-grid-bundle/src</directory>
                  </include>
              </source>
          </phpunit>
          EOF

          composer dump-autoload

      - name: Debug package installation
        working-directory: app
        run: |
          composer show f0ska/auto-grid-bundle
          composer show f0ska/auto-grid-test-bundle
          ls -la vendor/f0ska || true
          find vendor/f0ska -maxdepth 2 -type f | sort || true
          php -r 'require "vendor/autoload.php"; var_dump(class_exists("F0ska\\AutoGridBundle\\F0skaAutoGridBundle")); var_dump(class_exists("F0ska\\AutoGridTestBundle\\F0skaAutoGridTestBundle"));'

      - name: Debug Symfony boot
        working-directory: app
        env:
          APP_ENV: test
        run: |
          cat config/bundles.php
          echo "--- config/routes/f0ska_auto_grid_test.yaml"
          cat config/routes/f0ska_auto_grid_test.yaml
          php -r 'require "vendor/autoload.php"; $bundles = require "config/bundles.php"; var_dump(isset($bundles["F0ska\\AutoGridBundle\\F0skaAutoGridBundle"])); var_dump(isset($bundles["F0ska\\AutoGridTestBundle\\F0skaAutoGridTestBundle"])); var_dump(class_exists("F0ska\\AutoGridBundle\\F0skaAutoGridBundle")); var_dump(class_exists("F0ska\\AutoGridTestBundle\\F0skaAutoGridTestBundle"));'
          php bin/console about -vvv
          php bin/console debug:router | grep auto_grid_test || true
          php bin/console router:match /auto-grid/advanced || true

      - name: Install importmap assets
        working-directory: app
        run: php bin/console importmap:install --no-interaction

      - name: Prepare test database
        working-directory: app
        env:
          APP_ENV: test
        run: |
          rm -f var/test.db
          php bin/console doctrine:schema:update --force --env=test
          php bin/console doctrine:fixtures:load --no-interaction --env=test

      - name: Run functional tests
        working-directory: app
        env:
          APP_ENV: test
        run: vendor/bin/phpunit -c phpunit.xml.dist
